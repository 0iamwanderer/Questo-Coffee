<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Questo · QR Menü</title>

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts: Instrument Serif (display) + Manrope (UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        oklch(0.962 0.014 78);
      --bg-page:   oklch(0.948 0.018 78);
      --surface:   #fffdf6;
      --surface-2: oklch(0.93  0.018 78);
      --ink:       oklch(0.22  0.028 52);
      --ink-soft:  oklch(0.42  0.022 52);
      --ink-mute:  oklch(0.58  0.018 60);
      --line:      oklch(0.86  0.018 75);
      --accent:    oklch(0.55  0.13  38);
      --accent-soft: oklch(0.92 0.04  40);
    }
    html, body {
      font-family: 'Manrope', ui-sans-serif, system-ui, sans-serif;
      background: #1c1814;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    .font-display { font-family: 'Instrument Serif', 'Times New Roman', serif; font-weight: 400; letter-spacing: 0.005em; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* screen transitions */
    @keyframes screenIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes catIn {
      from { opacity: 0; transform: translateX(14px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes sheetIn {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    /* Kapak açılma/kapanma — landing ↔ menu geçişlerinde */
    @keyframes coverOpen {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(-180deg); }
    }
    @keyframes coverClose {
      0%   { transform: rotateY(-180deg); }
      100% { transform: rotateY(0deg); }
    }
    .anim-screen { animation: screenIn 520ms cubic-bezier(.2,.7,.2,1) both; }
    .anim-cat    { animation: catIn 360ms cubic-bezier(.2,.7,.2,1) both; }
    .anim-sheet  { animation: sheetIn 380ms cubic-bezier(.2,.8,.2,1) both; }
    .anim-fade   { animation: fadeIn 220ms ease both; }

    /* placeholder texture for product images */
    .ph-stripes {
      background-image:
        repeating-linear-gradient(135deg,
          rgba(0,0,0,.045) 0 1px,
          transparent 1px 7px);
    }
  </style>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
